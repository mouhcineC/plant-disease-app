services:
  mysql:
    image: mysql:8.0
    container_name: plant-disease-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-plant_disease_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-service:
    build:
      context: ./ai-service
    container_name: plant-disease-ai-service
    restart: unless-stopped
    environment:
      AI_SERVICE_PORT: ${AI_SERVICE_PORT:-8000}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: plant-disease-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-plant_disease_db}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_strong_secret_32_chars_min}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AI_SERVICE_URL: http://ai-service:8000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dzhjyp9nl}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-724468549312829}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-AvEeF034gsWGhvAvpV2NHoVaIjM}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: plant-disease-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  mysql_data:
